name: App Integration Workflow

on:
  workflow_dispatch:
  repository_dispatch:
    types: [app-update]

jobs:
  trigger-discovery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build and start Docker services
        run: |
          docker compose build
          docker compose up -d

      - name: Wait for API to be ready
        run: |
          timeout 120 bash -c 'until curl -s http://localhost:8000/health > /dev/null; do sleep 5; done'

      - name: Trigger Discovery Agent
        env:
          APP_REPO: ${{ github.event.client_payload.repo || 'lokeshsharma99/GDS-Demo-App' }}
          APP_BRANCH: ${{ github.event.client_payload.branch || 'main' }}
          APP_COMMIT: ${{ github.event.client_payload.commit_sha }}
        run: |
          curl -X POST http://localhost:8000/webhooks/app-update \
            -H "Content-Type: application/json" \
            -d "{
              \"repo\": \"${APP_REPO}\",
              \"branch\": \"${APP_BRANCH}\",
              \"commit_sha\": \"${APP_COMMIT}\",
              \"event_type\": \"${{ github.event.client_payload.event_type }}\"
            }"

      - name: Stop services
        if: always()
        run: |
          docker compose down
